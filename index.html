<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOT 41 Days Rush Hour Class - Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fade-in-up {
            opacity: 0;
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Staggered animation delays for the form fields */
        .delay-100 { animation-delay: 100ms; }
        .delay-150 { animation-delay: 150ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-250 { animation-delay: 250ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-350 { animation-delay: 350ms; }
        .delay-400 { animation-delay: 400ms; }
        .delay-500 { animation-delay: 500ms; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-100 min-h-screen flex items-center justify-center p-4 md:p-8 font-sans text-slate-800">

    <div class="bg-white/80 backdrop-blur-xl w-full max-w-2xl p-6 md:p-10 rounded-3xl shadow-2xl border border-white/50 animate-fade-in-up">
        
        <div class="text-center mb-8 animate-fade-in-up delay-100">
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight mb-2">
                Simplified Online Tutorials
            </h1>
            <p class="text-blue-600 font-medium bg-blue-50 inline-block px-4 py-1.5 rounded-full text-sm">
                41 Days Rush Hour Class - Paid Student Portal
            </p>
        </div>

        <form id="sotForm" class="space-y-5">
            
            <div class="animate-fade-in-up delay-150">
                <label for="fullName" class="block text-sm font-semibold text-slate-700 mb-1">Full Name</label>
                <input type="text" id="fullName" name="fullName" placeholder="Surname First" required
                    class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 transition-all duration-300 outline-none hover:border-slate-300">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5 animate-fade-in-up delay-200">
                <div>
                    <label for="whatsappName" class="block text-sm font-semibold text-slate-700 mb-1">WhatsApp Name</label>
                    <input type="text" id="whatsappName" name="whatsappName" placeholder="Name used on WhatsApp" required
                        class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 transition-all duration-300 outline-none hover:border-slate-300">
                </div>
                <div>
                    <label for="phoneNumber" class="block text-sm font-semibold text-slate-700 mb-1">Active Phone Number</label>
                    <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="e.g. 08012345678" required
                        class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 transition-all duration-300 outline-none hover:border-slate-300">
                </div>
            </div>

            <div class="animate-fade-in-up delay-250">
                <label for="telegramUsername" class="block text-sm font-semibold text-slate-700 mb-1">Telegram Username</label>
                <input type="text" id="telegramUsername" name="telegramUsername" placeholder="e.g. @yourusername" required
                    class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 transition-all duration-300 outline-none hover:border-slate-300">
                <p class="text-xs text-red-500 mt-1.5 font-medium flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                    Please use the normal Telegram app (Telegram X is strictly not allowed).
                </p>
            </div>

            <div class="animate-fade-in-up delay-300">
                <label for="email" class="block text-sm font-semibold text-slate-700 mb-1">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Your active email" required
                    class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 transition-all duration-300 outline-none hover:border-slate-300">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5 animate-fade-in-up delay-350">
                <div>
                    <label for="institution" class="block text-sm font-semibold text-slate-700 mb-1">First Choice Institution</label>
                    <input type="text" id="institution" name="institution" placeholder="e.g. OAU, UNILAG, UI" required
                        class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 transition-all duration-300 outline-none hover:border-slate-300">
                </div>
                <div>
                    <label for="course" class="block text-sm font-semibold text-slate-700 mb-1">Course of Choice</label>
                    <input type="text" id="course" name="course" placeholder="e.g. Medicine, Law, Engineering" required
                        class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 transition-all duration-300 outline-none hover:border-slate-300">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5 animate-fade-in-up delay-400">
                <div>
                    <label for="subjects" class="block text-sm font-semibold text-slate-700 mb-1">UTME Subject Combination</label>
                    <input type="text" id="subjects" name="subjects" placeholder="e.g. Eng, Bio, Chem, Phy" required
                        class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 transition-all duration-300 outline-none hover:border-slate-300">
                </div>
                <div>
                    <label for="targetScore" class="block text-sm font-semibold text-slate-700 mb-1">Target JAMB Score</label>
                    <input type="number" id="targetScore" name="targetScore" placeholder="e.g. 300" required
                        class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 transition-all duration-300 outline-none hover:border-slate-300">
                </div>
            </div>

            <div class="animate-fade-in-up delay-500">
                <label for="reason" class="block text-sm font-semibold text-slate-700 mb-1">Why did you decide to join the SOT 41 Days Rush Hour Class?</label>
                <textarea id="reason" name="reason" placeholder="Briefly tell us your expectations..." required rows="3"
                    class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 transition-all duration-300 outline-none hover:border-slate-300 resize-y"></textarea>
            </div>

            <div class="pt-2 animate-fade-in-up delay-500">
                <button type="submit" id="submitBtn" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg hover:shadow-blue-500/30 transform hover:-translate-y-1 transition-all duration-300 active:scale-95 flex justify-center items-center">
                    <span>Submit Registration</span>
                </button>
            </div>
            
            <div id="statusMessage" class="hidden text-center mt-4 p-3 rounded-lg font-semibold animate-fade-in-up"></div>
        </form>
    </div>

    <script>
        const form = document.getElementById('sotForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');

        // YOU WILL REPLACE THIS URL WITH YOUR GOOGLE APPS SCRIPT WEB APP URL
        const scriptURL = 'https://script.google.com/macros/s/AKfycbymNgLU01CdPpvNlzoWQCVQSvS5TZTXrXVeDxQXyQM8lTeRffBjeKuQwI1yKdfjVrv5/exec'; 

        form.addEventListener('submit', e => {
            e.preventDefault();
            
            // Loading state
            const originalBtnText = submitBtn.innerHTML;
            submitBtn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Processing...`;
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-80', 'cursor-not-allowed');

            const formData = new FormData(form);

            fetch(scriptURL, { method: 'POST', body: formData })
                .then(response => {
                    statusMessage.textContent = 'Registration successful! Welcome to the SOT 41 Days Rush Hour Class.<br><br>Our team will send an email with your classroom links shortly.';
                    statusMessage.className = 'mt-4 p-3 rounded-lg font-semibold bg-emerald-100 text-emerald-700 block animate-fade-in-up';
                    form.reset();
                    resetButton(originalBtnText);
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    statusMessage.textContent = 'Something went wrong. Please check your connection and try again.';
                    statusMessage.className = 'mt-4 p-3 rounded-lg font-semibold bg-red-100 text-red-700 block animate-fade-in-up';
                    resetButton(originalBtnText);
                });
        });

        function resetButton(text) {
            submitBtn.innerHTML = text;
            submitBtn.disabled = false;
            submitBtn.classList.remove('opacity-80', 'cursor-not-allowed');
        }
    </script>
</body>
</html>
